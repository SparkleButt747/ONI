name: executor_search_before_edit
description: Executor should search for relevant files when the path is not explicitly given
tier: medium
input:
  - role: user
    content: "find where the database connection pool is initialised and increase the max connections to 20"
assertions:
  - type: has_tool_call
    tool: search_files
  - type: not_contains
    value: "I'm going to"
  - type: not_contains
    value: "I will now"
